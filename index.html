<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Guilda</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- PAINEL SUPERIOR DE RECURSOS -->
    <header id="resource-bar">
        <div class="resource-item">
            <span>🪙 Ouro:</span>
            <strong id="gold-display">0</strong>
            <small class="gps-tag">(+<span id="gps-display">0.0</span>/s)</small>
        </div>
        <div class="resource-item">
            <span>👑 Prestígio:</span>
            <strong id="prestige-display">0</strong>
        </div>
        <div class="resource-item">
            <span>👥 Membros:</span>
            <strong id="members-display">0/4</strong>
        </div>
        <button class="reset-btn" onclick="resetGame()">🔄 Resetar</button>
    </header>

    <!-- NAVEGAÇÃO DE ABAS -->
    <nav id="tabs-navigation">
        <button class="nav-btn active" onclick="switchTab('aventureiros')">⚔️ Aventureiros</button>
        <button class="nav-btn" onclick="switchTab('missoes')">📜 Missões</button>
        <button class="nav-btn" onclick="switchTab('construcoes')">🏛️ Construções</button>
    </nav>

    <!-- CONTEÚDO DAS ABAS -->
    <main id="game-content">
        <!-- Aba Aventureiros -->
        <section id="tab-aventureiros" class="tab-content active">
            <div id="adventurers-container"></div>
        </section>

        <!-- Aba Missões -->
        <section id="tab-missoes" class="tab-content">
            <div id="active-quests-container" class="active-quests-box"></div>
            <div id="quests-container"></div>
        </section>

        <!-- Aba Construções -->
        <section id="tab-construcoes" class="tab-content">
            <div id="buildings-container"></div>
        </section>
    </main>

    <!-- SCRIPTS DO JOGO (NA ORDEM CORRETA DE CARREGAMENTO) -->
    <script src="js/state.js"></script>
    <script src="js/hero.js"></script>
    <script src="js/buildings.js"></script>
    <script src="js/adventurers.js"></script>
    <script src="js/quests.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
